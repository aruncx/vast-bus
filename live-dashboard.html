<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Basic SEO -->
    <title>Live Bus Dashboard | VAST Bus Routes & Transport System</title>
    <meta name="description" content="Track VAST college buses in real-time. Live location updates and ETA for students and staff of Vidya Academy of Science and Technology.">

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:title" content="VAST Bus Live Tracking">
    <meta property="og:description" content="Monitor your college bus location in real-time. Fast, simple, and mobile-friendly tracking for VAST students.">
    <meta property="og:url" content="https://vastbus.vercel.app/live-dashboard.html">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://vastbus.vercel.app/preview.png">

    <!-- Optional but Recommended -->
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://vastbus.vercel.app/live-dashboard.html">
    
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css">

    <!-- Leaflet.js for custom Map (Google Maps alternative for multiple dynamic markers if no API key is set) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <style>
        body { margin: 0; padding: 0; background: var(--neutral-900); color: #fff; display: flex; flex-direction: column; height: 100vh; }
        .dashboard-header { background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(12px); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--neutral-800); z-index: 1000; }
        .dashboard-header h1 { font-family: 'Outfit'; font-size: clamp(1.25rem, 4vw, 1.8rem); margin: 0; display: flex; align-items: center; gap: 0.5rem; }
        .btn-back { display: flex; align-items: center; gap: 0.5rem; color: var(--brand-400); text-decoration: none; font-weight: 600; font-family: 'Inter'; background: rgba(196, 124, 58, 0.1); padding: 0.75rem 1.25rem; border-radius: 8px; transition: all 0.2s ease; font-size: 1rem; min-height: 44px; }
        .btn-back:hover { background: rgba(196, 124, 58, 0.2); }
        
        #map-container { flex: 1; width: 100%; position: relative; }
        #live-map { height: 100%; width: 100%; }

        .bus-marker-icon { background: var(--brand-500); color: white; border-radius: 50%; width: 40px !important; height: 40px !important; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border: 3px solid #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .marker-inactive { background: var(--neutral-400); }
        .marker-active { background: #10b981; animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .bus-tooltip { font-family: 'Inter'; }
        .bus-tooltip strong { display: block; font-family: 'Outfit'; font-size: 1.1rem; color: #111; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 1rem; font-weight: bold; color: #fff; margin-top: 5px; }
        .status-active { background: #10b981; }
        .status-inactive { background: #ef4444; }

        /* Tracking Route UI */
        #eta-overlay { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.95); color: #111; padding: 1rem 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-family: 'Inter', sans-serif; font-size: 1rem; z-index: 2000; display: flex; align-items: center; gap: 0.8rem; border-left: 4px solid var(--brand-500); width: 90%; max-width: 400px; }
        #eta-overlay.hidden { display: none !important; }

        /* Auth Guard Overlay */
        #auth-guard { position: fixed; inset: 0; background: var(--neutral-950); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; transition: opacity 0.5s ease; }
        .auth-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 3rem 2rem; border-radius: 24px; max-width: 400px; width: 100%; box-shadow: var(--shadow-xl); }
        .auth-status-icon { font-size: 3rem; margin-bottom: 1.5rem; color: var(--amber); }

        /* Header Profile */
        .user-chip { display: flex; align-items: center; gap: 10px; padding: 6px 12px; background: rgba(255,255,255,0.1); border-radius: 30px; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.1); }
        .user-chip img { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--amber); }
        
        @media (max-width: 768px) {
            .dashboard-header h1 { font-size: 1.2rem; }
            .user-chip span { display: none; }
        }
    </style>
</head>

<body>
    
    <header class="dashboard-header">
        <h1 style="flex: 1;"><i class="fa-solid fa-satellite-dish" style="color: #ef4444;"></i> <span>Live Bus Dashboard</span></h1>
        
        <div id="dashboard-user" style="display: none; align-items: center; gap: 15px; margin-right: 15px;">
            <div class="user-chip">
                <img id="dash-user-photo" src="" alt="">
                <span id="dash-user-name">Loading...</span>
            </div>
        </div>

        <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> <span>Back</span></a>
    </header>

    <!-- Auth Guard Overlay -->
    <div id="auth-guard">
        <div class="auth-card animate-fade-up">
            <div class="auth-status-icon">
                <i class="fa-solid fa-circle-notch fa-spin"></i>
            </div>
            <h2 style="font-family: 'Outfit'; margin-bottom: 0.5rem;">Authenticating</h2>
            <p style="color: rgba(255,255,255,0.5); font-size: 0.9rem;">Verifying your college credentials...</p>
            <div id="auth-guard-error" style="display:none; margin-top: 1.5rem; color: #ef4444; font-weight: 600;"></div>
        </div>
    </div>

    <div id="map-container">
        <!-- Leaflet Map goes here -->
        <div id="live-map"></div>
        
        <!-- ETA Tracking Banner -->
        <div id="eta-overlay" class="hidden">
            <i class="fa-solid fa-spinner fa-spin" style="color: var(--brand-500); font-size: 1.2rem;"></i> 
            <span id="eta-text-content">Calculating Route & ETA...</span>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="dashboard.js"></script>

</body>
</html>
